# Phase 3 staging environment.
#
# PROVISIONAL values documented inline with rationale. When reviewing
# after a week of paper operation, either confirm or change-log here.

[env]
name = "staging"
mode = "paper"

# Per-strategy capital + loss thresholds live in each strategy TOML's
# [paper] section (ADR 0008). Values below kept as a fallback for
# strategies that don't define their own [paper] block.
capital_usd = 1000.0
daily_loss_alert_pct = 0.03
daily_loss_pause_pct = 0.05

heartbeat_interval_s = 10
heartbeat_timeout_s = 60

reconciliation_interval_s = 300

paper_ticks_retention_days = 30

[strategies.trend_confirm_t1_v1]
enabled = true
params_file = "config/strategies/pbt5m_trend_confirm_t1_v1.toml"

[strategies.last_90s_forecaster_v3]
# v2 base + 5 Binance microstructure features (CVD, taker_ratio,
# intensity, large_trade, signed_autocorr). Active in paper with
# explicit gate-bypass per BITACORA 2026-04-25.
enabled = true
params_file = "config/strategies/pbt5m_last_90s_forecaster_v3.toml"

[strategies.bb_residual_ofi_v1]
# BB-residual + OFI shrinkage; per-tick scan across [60, 290] s.
# Boots shadow (no active model row); strategy logs feature trail
# until ensemble is trained. Promotion gated by tea-promotion-gate.
enabled = true
params_file = "config/strategies/pbt5m_bb_residual_ofi_v1.toml"

[strategies.oracle_lag_v1]
# ADR 0013/0014 — analytic Φ(δ/σ√τ) on Chainlink-vs-spot residual.
# 2026-04-26 promoted from shadow to active paper at conservative
# stake ($2). Phase 0 Binance-only — Phase 1 cesta with live-refresh
# deferred to v1.1. Revert to shadow if paper trailing 7d PnL ≤ 0
# or WR < 50 % over ≥ 30 fills.
enabled = true
params_file = "config/strategies/pbt5m_oracle_lag_v1.toml"

[strategies.oracle_lag_v2]
# ADR 0014 — maker-first Avellaneda-Stoikov quoting on the same
# scoring core as v1. Loaded by the engine in `shadow = true` (set
# in pbt5m_oracle_lag_v2.toml [paper]) — operator gate-bypass on the
# "≥ 2 weeks v1 paper-shadow" precondition declared 2026-04-26.
# v2 emits ENTER signals but the cancel+place adapter on top of
# SimulatedExecutionClient is not wired yet, so shadow stays on
# until that lands. Flipping shadow=false requires the falsification
# gate from ADR 0014 § Falsification (PnL/share v2 ≥ v1 + 1.5 ¢ AND
# maker fill rate ≥ 40 %).
enabled = true
params_file = "config/strategies/pbt5m_oracle_lag_v2.toml"

[deployment]
service = "tea-engine"
# staging: no confirmation file required.
# production.toml would set ["I_UNDERSTAND_THIS_IS_REAL_MONEY"].
required_ack_files = []

[alerts]
telegram_enabled = true
# bot_token + chat_id come from /etc/trading-system/secrets.env:
#   TEA_TELEGRAM_BOT_TOKEN
#   TEA_TELEGRAM_CHAT_ID
