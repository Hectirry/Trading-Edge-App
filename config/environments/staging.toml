# Phase 3 staging environment.
#
# PROVISIONAL values documented inline with rationale. When reviewing
# after a week of paper operation, either confirm or change-log here.

[env]
name = "staging"
mode = "paper"

# Per-strategy capital + loss thresholds live in each strategy TOML's
# [paper] section (ADR 0008). Values below kept as a fallback for
# strategies that don't define their own [paper] block.
capital_usd = 1000.0
daily_loss_alert_pct = 0.03
daily_loss_pause_pct = 0.05

heartbeat_interval_s = 10
heartbeat_timeout_s = 60

reconciliation_interval_s = 300

paper_ticks_retention_days = 30

[strategies.trend_confirm_t1_v1]
enabled = true
params_file = "config/strategies/pbt5m_trend_confirm_t1_v1.toml"

[strategies.last_90s_forecaster_v1]
enabled = true
params_file = "config/strategies/pbt5m_last_90s_forecaster_v1.toml"

[strategies.last_90s_forecaster_v2]
# Shadow mode until the training CLI promotes a model row
# (ADR 0011). The strategy also auto-shadows when no active row exists
# in research.models, so enabling it here is safe.
enabled = true
params_file = "config/strategies/pbt5m_last_90s_forecaster_v2.toml"

[strategies.last_90s_forecaster_v3]
# v2 + 5 Binance microstructure features. Boots shadow (no v3 model
# in research.models). Auto-shadow path is the same as v2.
enabled = true
params_file = "config/strategies/pbt5m_last_90s_forecaster_v3.toml"

[strategies.contest_ensemble_v1]
# ADR 0012 — Moondev contest A/B arm A. Boots with the explicit-rules
# ensemble; upgrades to the LightGBM meta when a model row is promoted.
enabled = true
params_file = "config/strategies/contest_ensemble_v1.toml"

[strategies.contest_avengers_v1]
# ADR 0012 — Moondev contest A/B arm B. Hard-threshold confidence
# gate + oracle-lag + liquidation-gravity signals. Degrades gracefully
# when Chainlink/Coinalyze keys aren't configured (capped confidence).
enabled = true
params_file = "config/strategies/contest_avengers_v1.toml"

[deployment]
service = "tea-engine"
# staging: no confirmation file required.
# production.toml would set ["I_UNDERSTAND_THIS_IS_REAL_MONEY"].
required_ack_files = []

[alerts]
telegram_enabled = true
# bot_token + chat_id come from /etc/trading-system/secrets.env:
#   TEA_TELEGRAM_BOT_TOKEN
#   TEA_TELEGRAM_CHAT_ID
