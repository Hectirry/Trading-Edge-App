# last_90s_forecaster_v1 — rules baseline at t=210 s (ADR 0011).

name = "last_90s_forecaster_v1"
description = "Micro momentum + macro regime at t=210 s; edge vs implied_prob_yes."

[params]
entry_window_start_s = 205
entry_window_end_s = 215

# momentum_divisor_bps is grid-searched (20/30/40/50/60) before first
# paper deploy; 40 is the provisional value documented in ADR 0011.
momentum_divisor_bps = 40.0

edge_threshold = 0.04
# Typical Polymarket 5m BTC book width in the entry window (t=205-215
# s) is 200-220 bps in staging. 300 gives headroom; tighten later if
# signals get noisy.
spread_max_bps = 300.0

adx_threshold = 20.0
consecutive_min = 2

# Only read from the last 20 closed 5 m candles for macro features
# (MacroProvider returns None below this count).
ohlc_lookback_candles = 20

[sizing]
# Fixed stake until Kelly-fractional kicks in after n_paper ≥ 20 settled
# trades (ADR 0011). Hybrid sizing is applied by the driver, not here.
stake_usd = 5.0
kelly_fraction = 0.25
kelly_min_trades = 20
kelly_max_stake_usd = 15.0

[backtest]
earliest_entry_t_s = 205
latest_entry_t_s = 215
window_seconds = 300
decision_interval_s = 1

[fill_model]
slippage_bps = 10.0
fill_probability = 1.0
apply_fee_in_backtest = true
fee_k = 0.05

[risk]
bypass_in_backtest = true
cooldown_seconds = 30
max_position_size_usd = 15.0  # Kelly upper cap
daily_loss_limit_usd = 50.0
daily_trade_limit = 999999
min_edge_bps = 0
min_z_score = 0.0
min_pm_depth_usd = 15.0
skip_if_spread_bps = 500
loss_pause_threshold_usd = 5.0
loss_pause_window_minutes = 30
loss_pause_duration_minutes = 30

[paper]
capital_usd = 1000.0
daily_loss_alert_pct = 0.03
daily_loss_pause_pct = 0.05
shadow = false
