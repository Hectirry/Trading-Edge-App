# contest_avengers_v1 — Moondev contest, asymmetry + hard threshold (ADR 0012).

name = "contest_avengers_v1"
description = "Chainlink lag + liquidation gravity + HMM kill-switch + OFI tie-break; hard confidence gate."

[params]
checkpoints_s = [180, 210, 240, 270]
checkpoint_tolerance_s = 3.0

# Hard PREDICT gate. Below this → abstain and wait next checkpoint.
confidence_threshold = 0.75

# Chainlink oracle parameters (abstraction picks Data Streams when the
# key is set, else Polygon EAC proxy via Alchemy, else Null).
chainlink_min_delta_bps = 5.0
chainlink_min_age_s = 2.0
chainlink_max_synced_age_s = 3.0    # OFI tie-breaker activates below this

# Liquidation-gravity band in percent around spot.
liquidation_band_pct = 0.3
liquidation_close_band_pct = 0.15
liquidation_large_cluster_usd = 100000.0

[sizing]
stake_usd = 5.0
kelly_fraction = 0.0
kelly_min_trades = 99999
kelly_max_stake_usd = 5.0

[backtest]
earliest_entry_t_s = 180
latest_entry_t_s = 275
window_seconds = 300
decision_interval_s = 1

[fill_model]
slippage_bps = 10.0
fill_probability = 1.0
apply_fee_in_backtest = true
fee_k = 0.05

[risk]
bypass_in_backtest = true
cooldown_seconds = 30
max_position_size_usd = 5.0
daily_loss_limit_usd = 50.0
daily_trade_limit = 999999
min_edge_bps = 0
min_z_score = 0.0
min_pm_depth_usd = 15.0
skip_if_spread_bps = 500
loss_pause_threshold_usd = 5.0
loss_pause_window_minutes = 30
loss_pause_duration_minutes = 30

[paper]
capital_usd = 1000.0
daily_loss_alert_pct = 0.03
daily_loss_pause_pct = 0.05
shadow = false
