# last_90s_forecaster_v3 — v2 base + 5 Binance microstructure features.

name = "last_90s_forecaster_v3"
description = "v3: v2 features + Binance microstructure (CVD, taker_ratio, intensity, large_trade, signed_autocorr). Entrenado contra Binance OHLCV labels honestas."

[params]
entry_window_start_s = 205
entry_window_end_s = 215
edge_threshold = 0.02
spread_max_bps = 300.0
adx_threshold = 20.0
consecutive_min = 2

# Promotion gates (sample-size-aware in train_last90s).
promotion_auc_min = 0.55
promotion_brier_max = 0.245
promotion_ece_max = 0.05

# v3-specific microstructure params.
use_microstructure_features = true
microstructure_window_seconds = 90
large_trade_threshold_usd = 100000.0

[sizing]
stake_usd = 5.0
kelly_fraction = 0.25
kelly_min_trades = 20
kelly_max_stake_usd = 15.0

[backtest]
earliest_entry_t_s = 205
latest_entry_t_s = 215
window_seconds = 300
decision_interval_s = 1

[fill_model]
slippage_bps = 10.0
fill_probability = 1.0
apply_fee_in_backtest = true
fee_k = 0.05

[risk]
bypass_in_backtest = true
cooldown_seconds = 30
max_position_size_usd = 15.0
daily_loss_limit_usd = 50.0
daily_trade_limit = 999999
min_edge_bps = 0
min_z_score = 0.0
min_pm_depth_usd = 15.0
skip_if_spread_bps = 500
loss_pause_threshold_usd = 5.0
loss_pause_window_minutes = 30
loss_pause_duration_minutes = 30

[paper]
capital_usd = 1000.0
daily_loss_alert_pct = 0.03
daily_loss_pause_pct = 0.05
# 2026-04-25 — bypass del promotion gate: WF outcome B (inconcluso por
# gaps de datos prices_history y crypto_trades). Promoción consciente
# de riesgo en paper, no real money. Revertir a shadow=true si paper
# PnL trailing 7 d ≤ 0 o WR < 0.50. Detalle en BITACORA.
shadow = false
