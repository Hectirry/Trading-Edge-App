# mm_rebate_v1_eth15m — same MM strategy, ETH-updown 15m. MORE AGGRESSIVE.

name = "mm_rebate_v1_eth15m"
description = "MM neutral en ETH-updown 15m, zona [0.25, 0.50). Paper soak MORE-aggressive."

[params]
instance_name      = "mm_rebate_v1_eth15m"
slug_pattern       = "eth-updown-15m-"

zone_lo            = 0.20
zone_hi            = 0.60
dead_zone_lo       = 0.99
dead_zone_hi       = 0.99

window_seconds         = 900
entry_window_start_s   = 30      # was 60 — quote earlier
tau_terminal_s         = 15      # was 30 — quote into resolution edge

gamma_inventory_risk   = 0.1     # was 0.5
spread_floor_bps       = 25      # was 50
spread_ceiling_bps     = 500

stake_nominal_usd      = 30.0
quote_ttl_seconds      = 0

[sizing]
stake_usd              = 30.0
kelly_fraction         = 0.25
kelly_min_trades       = 50
kelly_max_stake_usd    = 50.0

[backtest]
earliest_entry_t_s     = 30
latest_entry_t_s       = 885
window_seconds         = 900
decision_interval_s    = 1

[fill_model]
slippage_bps           = 0.0
fill_probability       = 1.0
apply_fee_in_backtest  = true
fee_k                  = 0.05

[risk]
bypass_in_backtest         = true
cooldown_seconds           = 0
max_position_size_usd      = 75.0
daily_loss_limit_usd       = 9999.0
daily_trade_limit          = 999999
min_edge_bps               = 0
min_z_score                = 0.0
min_pm_depth_usd           = 5.0
skip_if_spread_bps         = 999
loss_pause_threshold_usd   = 0
loss_pause_window_minutes  = 0
loss_pause_duration_minutes = 0

[mm_safety]
inventory_cap_usdc           = 75.0
cancel_fill_ratio_max        = 50.0
cancel_fill_window_minutes   = 5
cancel_fill_kill_threshold   = 2
cancel_fill_kill_window_min  = 60
cancel_fill_resume_min       = 15
taker_fee_canary_pct         = 0.05
taker_fee_canary_window_days = 7
tau_terminal_s               = 15
auto_kill_on_breach          = false

[paper]
capital_usd                 = 750.0
daily_loss_alert_pct        = 0.40
daily_loss_pause_pct        = 9.99
max_quotes_concurrent       = 20
