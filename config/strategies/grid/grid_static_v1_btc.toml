# grid_static_v1 — BTC/USDT fixed-range static grid (Phase 3.8a smoke).
#
# Baseline variant: places N limit orders once, replaces the opposite
# side on every fill, stops on absolute stop-loss. No reset, no ATR, no
# regime gate (those land in 3.8b).

name = "grid_static_v1_btc"
description = "Fixed-range static grid, BTC/USDT spot Binance. 3.8a smoke."

strategy_id = "grid_static_v1_btc"
instrument_id = "BTCUSDT.BINANCE"

[params]
# Grid geometry. Center defaults to the spot at on_start unless set
# explicitly here; step is absolute USD for arithmetic, fractional for
# geometric (e.g. 0.005 = 0.5%).
# center_price = 75000.0         # opt-in; otherwise uses start spot
step = 500.0                      # $500 arithmetic step
geometric = false
n_below = 15                      # 15 BUY levels below center
n_above = 15                      # 15 SELL levels above
qty_per_level = 0.001             # 0.001 BTC per grid line (~$75 notional at $75k)
stop_loss_pct = 0.15              # floor = initial_center × (1 - 0.15)
# order_ttl_s = 86400             # optional; omit = no TTL

[paper]
capital_usd = 1000.0              # per plan — $1000 per instance
maker_fee_bps = 10.0              # [PROVISIONAL] Binance spot 0.1%
