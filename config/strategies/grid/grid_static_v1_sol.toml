# grid_static_v1 — SOL/USDT fixed-range static grid (Phase 3.8a).
#
# Baseline variant for SOL. Params mirror the BTC/ETH geometry scaled to
# SOL price (~$200 at plan, step ~1% = $2).
#
# NOTE: requires SOL OHLCV + trades ingestion (backfill in progress per
# the Phase 3.8a plan). Enable in staging.toml only after the ingestor is
# live.

name = "grid_static_v1_sol"
description = "Fixed-range static grid, SOL/USDT spot Binance. 3.8a smoke."

strategy_id = "grid_static_v1_sol"
instrument_id = "SOLUSDT.BINANCE"

[params]
step = 2.0
geometric = false
n_below = 15
n_above = 15
qty_per_level = 0.25
stop_loss_pct = 0.15

[paper]
capital_usd = 1000.0
maker_fee_bps = 10.0              # [PROVISIONAL] Binance spot 0.1%
