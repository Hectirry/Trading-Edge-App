# grid_dgt_v1 — BTC/USDT Dynamic Grid Trading (Phase 3.8a).
#
# DGT core variant (Chen et al. 2025). Geometric step so the grid scales
# with price on reset; 0.5% per level is the paper default.

name = "grid_dgt_v1_btc"
description = "Dynamic Grid Trading, BTC/USDT spot Binance. Reset on boundary breach."

strategy_id = "grid_dgt_v1_btc"
instrument_id = "BTCUSDT.BINANCE"

[params]
step = 0.005                      # 0.5% geometric
geometric = true
n_below = 15
n_above = 15
qty_per_level = 0.001
reset_cooldown_s = 3600
trend_gate_1h_pct = 0.03
stop_loss_pct = 0.15

[paper]
capital_usd = 1000.0
maker_fee_bps = 10.0              # [PROVISIONAL] Binance spot 0.1%
