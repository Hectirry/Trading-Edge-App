# mm_rebate_v1 — Avellaneda-Stoikov MM, BTC-updown 15m, below-zona only.
# AGGRESSIVE PAPER soak per operator decision (skip shadow mode).
# See estrategias/en-desarrollo/mm_rebate_v1.md and ADR 0015 (rebate erratum).

name = "mm_rebate_v1"
description = "MM neutral en BTC-updown 15m, zona [0.15, 0.40]. Paper soak agresivo."

[params]
# Multi-instance identity: name + slug_pattern. With 4 instances of
# MMRebateV1, each TOML gets a distinct name + slug filter.
instance_name      = "mm_rebate_v1_btc15m"
slug_pattern       = "btc-updown-15m-"

# Active price zone — RELAXED from [0.15, 0.40] to [0.25, 0.50) per Step 2
# observation that 99% of 15m market lifetime is spent in [0.40, 0.60].
# Edge of dead zone has liquidity but also informed-bot competition; that
# competition is exactly what the aggressive paper soak measures.
zone_lo            = 0.25
zone_hi            = 0.50
dead_zone_lo       = 0.50      # raised from 0.40 to give zone_hi headroom
dead_zone_hi       = 0.55

# Time window inside each 15-min market.
window_seconds         = 900
entry_window_start_s   = 30     # paper-MORE-aggressive: t=30s (was 60)
tau_terminal_s         = 15     # paper-MORE-aggressive: last 15s (was 30)

# AS optimal-spread params (MORE aggressive).
gamma_inventory_risk   = 0.1     # was 0.5 — less risk-averse, tighter spreads
spread_floor_bps       = 25      # was 50 — let it quote at 0.25¢ if math agrees
spread_ceiling_bps     = 500     # ceiling stays as safety

# Sizing (paper-MORE-aggressive: $30 stake).
stake_nominal_usd      = 30.0    # was 20

# Quote TTL (0 = GTC, cancelled on book-move via ReplaceQuote logic).
quote_ttl_seconds      = 0

[sizing]
stake_usd              = 30.0
kelly_fraction         = 0.25
kelly_min_trades       = 50
kelly_max_stake_usd    = 50.0

[backtest]
# These mirror direction-style strategies for parity at the driver layer.
# mm_rebate_v1 is MM (continuous quoting), so the entry_t window is wide.
earliest_entry_t_s     = 30
latest_entry_t_s       = 885       # T - tau_terminal (15s)
window_seconds         = 900
decision_interval_s    = 1

[fill_model]
# Maker fills via limit_book_sim (DEFAULT_MAKER_FEE_BPS = 10).
# fee_k below is taker-style, used only on forced-taker outflows
# (inventory-cap liquidation, terminal-window cleanup).
slippage_bps           = 0.0       # MM is maker-only; no taker slippage
fill_probability       = 1.0       # limit_book_sim handles fill semantics
apply_fee_in_backtest  = true
fee_k                  = 0.05      # parabolic taker fee_k (only for forced flows)

[risk]
# RiskManager (existing; bypassable in backtest for parity).
bypass_in_backtest         = true
cooldown_seconds           = 0     # MM never cools off intentionally
max_position_size_usd      = 50.0
daily_loss_limit_usd       = 9999.0  # paper: do NOT auto-pause on PnL drawdown
daily_trade_limit          = 999999
min_edge_bps               = 0     # MM doesn't gate on directional edge
min_z_score                = 0.0
min_pm_depth_usd           = 5.0
skip_if_spread_bps         = 999
loss_pause_threshold_usd   = 0     # disabled
loss_pause_window_minutes  = 0
loss_pause_duration_minutes = 0

[mm_safety]
# MMSafetyGuard — NOT bypassable. Paper-MORE-aggressive thresholds.
inventory_cap_usdc           = 75.0      # was 50 — bigger inventory tolerance
cancel_fill_ratio_max        = 50.0      # was 30 — see ratio fully before killing
cancel_fill_window_minutes   = 5
cancel_fill_kill_threshold   = 2
cancel_fill_kill_window_min  = 60
cancel_fill_resume_min       = 15
taker_fee_canary_pct         = 0.05      # 5% rolling 7d
taker_fee_canary_window_days = 7
tau_terminal_s               = 15        # match params section above (was 30)
auto_kill_on_breach          = false     # paper: alerts only, NO auto-kill

[paper]
capital_usd                 = 750.0      # was 500 — more headroom for $30 stake
daily_loss_alert_pct        = 0.40       # was 0.30 — more permissive alert
daily_loss_pause_pct        = 9.99       # disabled
max_quotes_concurrent       = 20         # was 10 — quote on more markets concurrently
# shadow_mode does NOT exist for this strategy — direct quote emission.
