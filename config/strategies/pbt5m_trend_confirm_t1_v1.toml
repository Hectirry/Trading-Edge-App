# trend_confirm_t1_v1 — ported from
# /home/coder/BTC-Tendencia-5m/strategies/trend_confirm_t1_v1.yaml
# (2026-04-22 tuning). Keep in sync when the source updates.

name = "trend_confirm_t1_v1"
description = "T-90s entry; sign(delta_bps) × AFML confirmation × Chainlink protection."

[params]
# Timing
entry_horizon_s = 210
horizon_tolerance_s = 10.0

# Direction threshold
delta_bps_min = 1.0

# Price cap on favored side
max_price = 0.92

# AFML confirmation count (f1..f4 + soft candle f6; f5_mc is shadow)
min_confirmations = 3
cusum_min_rate = 0.005

# Candle filter window
recent_window_s = 60
doji_body_ratio_min = 0.3

# Chainlink protection gate — DO NOT lower without explicit sign-off
cl_adverse_max_bps = 15.0

# AFML feature tuning
frac_d = 0.4
frac_size = 60
entropy_lookback = 60
cusum_threshold = 0.0005
cusum_lookback = 120
ar_lags = [1, 5, 15, 30]
autocorr_lag = 30

# Monte Carlo: shadow mode — logs mc_prob_up but doesn't count toward min_confirmations
mc_enabled = true
mc_shadow = true
mc_n_sims = 1000
mc_threshold = 0.55

# Order routing
order_type = "market"
limit_offset_bps = 50
gtc_ttl_seconds = 30

[sizing]
# BTC-Tendencia-5m strategy YAML declares stake_usd=10 and
# max_position_size_usd=10, but the top-level config.yaml sets
# risk.max_position_size_usd=5.0 which caps the effective stake at $5.
# Real live trades on 2026-04-22 use size_usd=5, so we mirror that cap
# here in the [risk] section below (which takes precedence via
# `min(stake_usd, risk.max_position_size_usd)`).
stake_usd = 10.0
kelly_fraction = 0.25
max_position_size_usd = 10.0

[backtest]
earliest_entry_t_s = 120
latest_entry_t_s = 240
window_seconds = 300
decision_interval_s = 1

[fill_model]
slippage_bps = 10.0
fill_probability = 0.95

[risk]
# Strategy-specific risk gate. Alert/pause thresholds are applied in the
# driver from capital_usd * alert_pct / pause_pct below.
# max_position_size_usd set to 5.0 to mirror BTC-Tendencia-5m/config.yaml
# top-level cap that actually applies in live (parity requirement).
cooldown_seconds = 30
max_position_size_usd = 5.0
daily_loss_limit_usd = 50.0
daily_trade_limit = 999999
min_edge_bps = 0          # strategy computes its own "edge" via AFML; no gate here
min_z_score = 0.0         # disabled: not part of trend_confirm decision
min_pm_depth_usd = 15.0
skip_if_spread_bps = 500
loss_pause_threshold_usd = 5.0
loss_pause_window_minutes = 30
loss_pause_duration_minutes = 30

[paper]
# Per-strategy paper capital and thresholds (see ADR 0008).
capital_usd = 1000.0
daily_loss_alert_pct = 0.03
daily_loss_pause_pct = 0.05
