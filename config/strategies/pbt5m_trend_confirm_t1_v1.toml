# trend_confirm_t1_v1 — ported 2026-04-24 from
# /home/coder/BTC-Tendencia-5m/strategies/trend_confirm_t1_v1.yaml
# (source dated 2026-04-23 PM1). Incorporates the full live-bot
# filter stack: min_fav_price, Chainlink concordance, prior_trend
# (f7), two-tier min_confirmations, and Monte Carlo as active vote
# (mc_shadow=false).

name = "trend_confirm_t1_v1"
description = "T-180s entry; sign(delta_bps) × 6-filter AFML stack × Chainlink protection × MC vote."

[params]
# Timing — latest entry T-2min (180s). Window widened earlier to allow
# entries from T-3min down to T-2min (±30s around T-2:30min).
entry_horizon_s = 150
horizon_tolerance_s = 30.0

# Direction threshold
delta_bps_min = 1.0

# Favored-side price band
max_price = 0.92
min_fav_price = 0.40

# Confirmation thresholds
min_confirmations = 5
high_price_threshold = 0.55
min_confirmations_high_price = 6

# Filter tuning
cusum_min_rate = 0.005
recent_window_s = 60
doji_body_ratio_min = 0.3
prior_trend_window_s = 600
prior_trend_min_slope_bps = 5.0

# Chainlink protection
cl_adverse_max_bps = 15.0
cl_concordance_min_ratio = 0.0

# AFML feature tuning
frac_d = 0.4
frac_size = 60
entropy_lookback = 60
cusum_threshold = 0.0005
cusum_lookback = 120
ar_lags = [1, 5, 15, 30]
autocorr_lag = 30

# Monte Carlo — active (non-shadow) as of 2026-04-23 PM1 in live
mc_enabled = true
mc_shadow = false
mc_n_sims = 1000
mc_threshold = 0.58

# Order routing
order_type = "market"
limit_offset_bps = 50
gtc_ttl_seconds = 30

[sizing]
stake_usd = 10.0
kelly_fraction = 0.25
max_position_size_usd = 10.0

[backtest]
earliest_entry_t_s = 120
latest_entry_t_s = 240
window_seconds = 300
decision_interval_s = 1

[fill_model]
slippage_bps = 10.0
fill_probability = 1.0
apply_fee_in_backtest = true
fee_k = 0.05

[risk]
bypass_in_backtest = true
cooldown_seconds = 30
max_position_size_usd = 5.0
daily_loss_limit_usd = 50.0
daily_trade_limit = 999999
min_edge_bps = 0
min_z_score = 0.0
min_pm_depth_usd = 15.0
skip_if_spread_bps = 500
loss_pause_threshold_usd = 5.0
loss_pause_window_minutes = 30
loss_pause_duration_minutes = 30

[paper]
capital_usd = 1000.0
daily_loss_alert_pct = 0.03
daily_loss_pause_pct = 0.05
