# last_90s_forecaster_v2 — LightGBM (ADR 0011).

name = "last_90s_forecaster_v2"
description = "LightGBM forecaster at t=210 s. Shadow-mode until AUC_test ≥ 0.55 AND Brier_test ≤ 0.245."

[params]
entry_window_start_s = 205
entry_window_end_s = 215
edge_threshold = 0.04
spread_max_bps = 150.0
adx_threshold = 20.0
consecutive_min = 2

# Promotion gates enforced by the training CLI when writing the model
# row. Strategies only boot with a model row that passes all three.
promotion_auc_min = 0.55
promotion_brier_max = 0.245
promotion_ece_max = 0.05

[sizing]
stake_usd = 5.0
kelly_fraction = 0.25
kelly_min_trades = 20
kelly_max_stake_usd = 15.0

[backtest]
earliest_entry_t_s = 205
latest_entry_t_s = 215
window_seconds = 300
decision_interval_s = 1

[fill_model]
slippage_bps = 10.0
fill_probability = 1.0
apply_fee_in_backtest = true
fee_k = 0.05

[risk]
bypass_in_backtest = true
cooldown_seconds = 30
max_position_size_usd = 15.0
daily_loss_limit_usd = 50.0
daily_trade_limit = 999999
min_edge_bps = 0
min_z_score = 0.0
min_pm_depth_usd = 15.0
skip_if_spread_bps = 500
loss_pause_threshold_usd = 5.0
loss_pause_window_minutes = 30
loss_pause_duration_minutes = 30

[paper]
capital_usd = 1000.0
daily_loss_alert_pct = 0.03
daily_loss_pause_pct = 0.05
# A trained + promoted model is live in research.models (AUC 0.66,
# Brier 0.25 on a 30-sample test; ADR 0011 sample-size-aware gates
# passed). Keeping shadow=false lets v2 ENTER in paper; the
# edge_threshold gate still filters out weak signals.
shadow = false
