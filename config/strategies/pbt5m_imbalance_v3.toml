# imbalance_v3 — parameters ported verbatim from
# /home/coder/polybot-btc5m/strategies/imbalance_v3.yaml (2026-04-22).
# Keep in sync when the source file updates; regenerate the params_hash
# in research.backtests after any edit.

name = "imbalance_v3"
description = "v2 filters + streak protection + optional regime filter. Port per ADR 0006."

[params]
imbalance_threshold = 1.05
min_depth_total_usd = 300.0
max_spread_bps = 200.0
require_depth_trend_min_pct = -5.0
allowed_sides = ["YES_UP"]
blocked_hours_utc = [2, 6]
max_consecutive_losses = 3
streak_pause_minutes = 30
# blocked_regimes = ["BEAR"]  # opt-in

[sizing]
stake_usd = 3.0
kelly_fraction = 0.25
max_position_size_usd = 3.0

[backtest]
# Entry window within each 5-min market; mirrors polybot config.yaml.
earliest_entry_t_s = 120
latest_entry_t_s = 240
window_seconds = 300
decision_interval_s = 1

[fill_model]
# Polybot backtest does NOT apply the parabolic fee — fee belongs to
# paper/live executor only. See core/backtest.py _resolve_pnl.
# Phase 3 will wire the parabolic fee back in via the live execution client.
slippage_bps = 10.0
fill_probability = 0.95

[risk]
# Copied from /home/coder/polybot-btc5m/config.yaml risk section.
# Gates strategy entries in both backtest and live modes.
cooldown_seconds = 30
max_position_size_usd = 5.0
daily_loss_limit_usd = 50.0
daily_trade_limit = 999999
min_edge_bps = 10
min_z_score = 0.5
min_pm_depth_usd = 15.0
skip_if_spread_bps = 500
loss_pause_threshold_usd = 5.0
loss_pause_window_minutes = 30
loss_pause_duration_minutes = 30
