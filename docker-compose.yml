# Trading-Edge-App — 7 service stack (Caddy omitted; Grafana served via existing Traefik).
# Tags pinned per reproducibility invariant.
# Secrets loaded from /etc/trading-system/secrets.env (chmod 600, owned root).

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-python-stub: &python-stub
  image: python:3.11.11-slim
  restart: unless-stopped
  logging: *default-logging
  command: ["python", "-c", "import time,sys,json; print(json.dumps({'event':'stub_up','service':__import__('os').environ.get('TEA_SERVICE','?')})); sys.stdout.flush()\nwhile True:\n    time.sleep(30)"]

services:

  tea-postgres:
    build: ./infra/postgres
    image: tea-postgres:0.1.0
    container_name: tea-postgres
    restart: unless-stopped
    env_file:
      - path: /etc/trading-system/secrets.env
        required: false
    environment:
      POSTGRES_DB: ${TEA_PG_DB}
      POSTGRES_USER: ${TEA_PG_USER}
      POSTGRES_PASSWORD: ${TEA_PG_PASSWORD}
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - tea_pgdata:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "max_connections=50"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TEA_PG_USER} -d ${TEA_PG_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging
    networks: [tea_internal]

  tea-redis:
    image: redis:7.4.1-alpine
    container_name: tea-redis
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru", "--save", ""]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging: *default-logging
    networks: [tea_internal]

  tea-ingestor:
    build:
      context: .
      dockerfile: infra/ingestor/Dockerfile
    image: tea-ingestor:0.2.0
    container_name: tea-ingestor
    restart: unless-stopped
    environment:
      TEA_SERVICE: ingestor
    env_file:
      - path: /etc/trading-system/secrets.env
        required: false
    depends_on:
      tea-postgres:
        condition: service_healthy
      tea-redis:
        condition: service_healthy
    logging: *default-logging
    networks: [tea_internal]

  tea-engine:
    build:
      context: .
      dockerfile: infra/engine/Dockerfile
    image: tea-engine:0.4.0
    container_name: tea-engine
    restart: unless-stopped
    environment:
      TEA_SERVICE: trading-engine
    env_file:
      - path: /etc/trading-system/secrets.env
        required: false
    depends_on:
      tea-postgres:
        condition: service_healthy
      tea-redis:
        condition: service_healthy
    volumes:
      # Kill switch + secrets (paper/live modes respect KILL_SWITCH;
      # backtest ignores it, see ADR 0005).
      - /etc/trading-system:/etc/trading-system:ro
      # Read-only mount of the polybot-btc5m SQLite for parity tests.
      - /home/coder/polybot-btc5m/data:/polybot-btc5m-data:ro
      # Read-only mount of polybot report JSONs for parity probe.
      - /home/coder/polybot-btc5m/reports:/polybot-btc5m-reports:ro
      # Read-only mount of BTC-Tendencia-5m data for trend_confirm_t1_v1 parity.
      - /home/coder/BTC-Tendencia-5m/data:/btc-tendencia-data:ro
      # Make scripts/ available in the engine for parity probe.
      - ./scripts:/app/scripts:ro
      # Research reports live under the engine's working tree so they
      # survive container restarts via named volume.
      - tea_research_reports:/app/src/trading/research/reports
      # Trained LightGBM models (ADR 0011).
      - tea_models:/app/models
    logging: *default-logging
    networks: [tea_internal]

  tea-api:
    build:
      context: .
      dockerfile: infra/api/Dockerfile
    image: tea-api:0.5.0
    container_name: tea-api
    restart: unless-stopped
    environment:
      TEA_SERVICE: api
    env_file:
      - path: /etc/trading-system/secrets.env
        required: false
    depends_on:
      tea-postgres:
        condition: service_healthy
      tea-redis:
        condition: service_healthy
    volumes:
      # Dual-path KILL_SWITCH (ADR 0009). Engine reads both; API writes here.
      - tea_control:/var/tea/control
      - tea_research_reports:/app/src/trading/research/reports
      # Required only for the whitelisted /system/restart endpoint.
      - /var/run/docker.sock:/var/run/docker.sock
    logging: *default-logging
    networks: [tea_internal, tea_edge]
    labels:
      traefik.enable: "true"
      traefik.docker.network: "tea_edge"
      traefik.http.routers.tea-api.rule: "Host(`187-124-130-221.nip.io`) && (PathPrefix(`/research`) || PathPrefix(`/api`))"
      traefik.http.routers.tea-api.entrypoints: "websecure"
      traefik.http.routers.tea-api.tls: "true"
      traefik.http.routers.tea-api.tls.certresolver: "letsencrypt"
      traefik.http.services.tea-api.loadbalancer.server.port: "8000"

  tea-telegram-bot:
    build:
      context: .
      dockerfile: infra/telegram_bot/Dockerfile
    image: tea-telegram-bot:0.4.0
    container_name: tea-telegram-bot
    restart: unless-stopped
    environment:
      TEA_SERVICE: telegram-bot
    env_file:
      - path: /etc/trading-system/secrets.env
        required: false
    depends_on:
      tea-redis:
        condition: service_healthy
    networks: [tea_internal]

  tea-grafana:
    image: grafana/grafana:11.4.0
    container_name: tea-grafana
    restart: unless-stopped
    env_file:
      - path: /etc/trading-system/secrets.env
        required: false
    environment:
      GF_SECURITY_ADMIN_USER: ${TEA_GF_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${TEA_GF_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: ${TEA_GF_ROOT_URL}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - tea_grafana:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      tea-postgres:
        condition: service_healthy
    logging: *default-logging
    networks: [tea_internal, tea_edge]
    labels:
      traefik.enable: "true"
      traefik.docker.network: "tea_edge"
      traefik.http.routers.tea-grafana.rule: "Host(`187-124-130-221.nip.io`) && PathPrefix(`/grafana`)"
      traefik.http.routers.tea-grafana.entrypoints: "websecure"
      traefik.http.routers.tea-grafana.tls: "true"
      traefik.http.routers.tea-grafana.tls.certresolver: "letsencrypt"
      traefik.http.services.tea-grafana.loadbalancer.server.port: "3000"

  tea-node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: tea-node-exporter
    restart: unless-stopped
    network_mode: host
    pid: host
    command:
      - "--path.rootfs=/host"
      - "--web.listen-address=127.0.0.1:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave
    logging: *default-logging

  tea-prometheus:
    image: prom/prometheus:v3.1.0
    container_name: tea-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - tea_prom_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging: *default-logging
    networks: [tea_internal]

networks:
  tea_internal:
    name: tea_internal
    driver: bridge
    internal: false
  tea_edge:
    name: tea_edge
    driver: bridge

volumes:
  tea_pgdata:
    name: tea_pgdata
  tea_grafana:
    name: tea_grafana
  tea_research_reports:
    name: tea_research_reports
  tea_models:
    name: tea_models
  tea_control:
    name: tea_control
  tea_prom_data:
    name: tea_prom_data
