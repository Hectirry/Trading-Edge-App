<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEA · Trading Edge App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --bg:       #0a0b0d;
    --bg-2:    #0d1015;
    --bg-3:    #11151c;
    --border:   #1f2937;
  }
  html, body { background: var(--bg); color: #e2e8f0; font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
  body { font-size: 12.5px; }
  .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: "tnum" 1, "zero" 1; }
  ::selection { background: rgba(52,211,153,0.3); }
  /* Scrollbars */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #0a0b0d; }
  ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 0; }
  ::-webkit-scrollbar-thumb:hover { background: #334155; }
  /* Crosshair gridlines background */
  .terminal-bg {
    background-image:
      linear-gradient(to right, rgba(30,41,59,0.25) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(30,41,59,0.25) 1px, transparent 1px);
    background-size: 48px 48px;
  }
  /* Tailwind sharp corners override feel — no rounded by default */
  * { border-radius: 0 !important; }
  .rounded-full { border-radius: 9999px !important; }
  /* Marquee keyframes */
  @keyframes ticker-marquee {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .ticker-scroll { animation: ticker-marquee 60s linear infinite; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="src/mockData.jsx"></script>
<script type="text/babel" src="src/api.jsx"></script>
<script type="text/babel" src="src/primitives.jsx"></script>
<script type="text/babel" src="src/overview.jsx"></script>
<script type="text/babel" src="src/strategies.jsx"></script>
<script type="text/babel" src="src/research.jsx"></script>
<script type="text/babel" src="src/modules.jsx"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const NAV = [
  { id: "overview",   label: "Overview",       icon: Icon.overview, badge: null },
  { id: "strategies", label: "Strategies",     icon: Icon.strategy, badge: "6" },
  { id: "research",   label: "Research",       icon: Icon.research, badge: null },
  { id: "copilot",    label: "LLM Copilot",    icon: Icon.llm,      badge: null },
  { id: "feeds",      label: "Data freshness", icon: Icon.feeds,    badge: null },
  { id: "health",     label: "System health",  icon: Icon.health,   badge: null },
  { id: "contest",    label: "Contest A/B",    icon: Icon.contest,  badge: "live" },
];

function TickerBar() {
  // Top ticker: live prices + strategy PnL
  const [tick, setTick] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), 1200);
    return () => clearInterval(id);
  }, []);

  const items = [
    { label: "BTCUSDT",      v: 94812.40 + Math.sin(tick * 0.3) * 28,   d: 0.48 },
    { label: "ETHUSDT",      v: 3284.12  + Math.sin(tick * 0.2) * 6,    d: -0.12 },
    { label: "SOLUSDT",      v: 184.22   + Math.sin(tick * 0.4) * 0.8,  d: 1.24 },
    { label: "POLY BTC-5m",  v: 0.5412   + Math.sin(tick * 0.5) * 0.004,d: 0.82, px: 4 },
    ...STRATEGIES.map(s => ({ label: s.name.toUpperCase(), v: s.pnl_24h + Math.sin(tick * 0.3 + s.id.length) * 1.2, pnl: true })),
    { label: "ENGINE UPTIME", v: "17d 04h", plain: true },
    { label: "BOOK",         v: "$10,000", plain: true },
    { label: "ACTIVE STRATS", v: "6/6", plain: true },
  ];

  return (
    <div className="flex items-center h-8 bg-[#0d1015] border-b border-slate-800 overflow-hidden">
      <div className="shrink-0 px-3 h-full flex items-center bg-emerald-500/10 border-r border-slate-800">
        <span className="font-mono text-[10px] uppercase tracking-[0.18em] text-emerald-400 flex items-center gap-1.5">
          <Pulse size={5} /> LIVE
        </span>
      </div>
      <div className="flex-1 overflow-hidden relative">
        <div className="flex gap-6 ticker-scroll whitespace-nowrap">
          {[...items, ...items].map((it, i) => (
            <div key={i} className="flex items-center gap-2 font-mono text-[11px] py-1">
              <span className="text-slate-500 uppercase tracking-wider">{it.label}</span>
              {it.plain ? (
                <span className="text-slate-200">{it.v}</span>
              ) : it.pnl ? (
                <span className={tone.pnl(it.v)}><Flash value={it.v.toFixed(2)}>{fmt.money(it.v)}</Flash></span>
              ) : (
                <>
                  <span className="text-slate-100 tabular-nums"><Flash value={it.v.toFixed(it.px || 2)}>{it.v.toFixed(it.px || 2)}</Flash></span>
                  <span className={`text-[10px] ${tone.pnl(it.d)}`}>{it.d >= 0 ? "▲" : "▼"}{Math.abs(it.d).toFixed(2)}%</span>
                </>
              )}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function Sidebar({ active, setActive, killArmed }) {
  const now = new Date();
  return (
    <aside className="w-56 shrink-0 bg-[#0d1015] border-r border-slate-800 flex flex-col">
      {/* Brand */}
      <div className="px-4 py-4 border-b border-slate-800">
        <div className="flex items-center gap-2.5">
          <div className="w-7 h-7 bg-emerald-500 text-slate-950 font-bold font-mono flex items-center justify-center text-[13px]">T</div>
          <div>
            <div className="font-mono text-[14px] text-slate-100 font-semibold leading-none">TEA</div>
            <div className="font-mono text-[9px] uppercase tracking-[0.15em] text-slate-500 mt-1">Trading Edge</div>
          </div>
        </div>
      </div>

      {/* Nav */}
      <nav className="flex-1 py-3">
        <div className="px-4 pb-1.5">
          <span className="font-mono text-[9px] uppercase tracking-[0.18em] text-slate-600">Operations</span>
        </div>
        {NAV.map(n => (
          <button
            key={n.id}
            onClick={() => setActive(n.id)}
            className={`w-full text-left px-4 py-1.5 font-mono text-[12px] flex items-center gap-2.5 transition-colors ${
              active === n.id
                ? "bg-emerald-500/10 text-emerald-400 border-l-2 border-emerald-500"
                : "text-slate-400 hover:bg-slate-800/30 hover:text-slate-200 border-l-2 border-transparent"
            }`}
          >
            <span className={active === n.id ? "text-emerald-400" : "text-slate-500"}>
              <n.icon />
            </span>
            <span className="flex-1">{n.label}</span>
            {n.badge && (
              <span className={`text-[9px] font-mono px-1.5 py-px border ${
                n.badge === "live"
                  ? "border-emerald-500/40 text-emerald-400 bg-emerald-500/10"
                  : "border-slate-700 text-slate-400 bg-slate-800/40"
              }`}>
                {n.badge}
              </span>
            )}
          </button>
        ))}
      </nav>

      {/* Status footer */}
      <div className="border-t border-slate-800 px-4 py-3 space-y-2">
        <div className="flex items-center justify-between text-[10px] font-mono">
          <span className="text-slate-500 uppercase tracking-wider">Engine</span>
          <span className={`flex items-center gap-1.5 ${killArmed ? "text-rose-400" : "text-emerald-400"}`}>
            <span className={`w-1.5 h-1.5 rounded-full ${killArmed ? "bg-rose-400" : "bg-emerald-400"}`} />
            {killArmed ? "halted" : "running"}
          </span>
        </div>
        <div className="flex items-center justify-between text-[10px] font-mono">
          <span className="text-slate-500 uppercase tracking-wider">Env</span>
          <span className="text-amber-400">paper</span>
        </div>
        <div className="flex items-center justify-between text-[10px] font-mono">
          <span className="text-slate-500 uppercase tracking-wider">Region</span>
          <span className="text-slate-300">eu-west-1</span>
        </div>
        <div className="pt-2 border-t border-slate-800/60 text-[10px] font-mono text-slate-500">
          <div>{now.toISOString().slice(0, 10)}</div>
          <div className="text-slate-400">{now.toTimeString().slice(0, 8)} UTC</div>
        </div>
      </div>
    </aside>
  );
}

function PageHeader({ active }) {
  const n = NAV.find(x => x.id === active);
  const subs = {
    overview:   "Engine status, PnL, heartbeat, kill switch",
    strategies: "Manage 6 active strategies · pause/resume inline",
    research:   "Backtests, walk-forward analysis, paper-vs-backtest drift",
    copilot:    "Ask the AI about your strategies · grounded on live data",
    feeds:      "Datos en tiempo real · health de todos los feeds",
    health:     "Infra services · CPU, memory, latency, alerts",
    contest:    "Model A/B testing · accuracy, coverage, confusion",
  };
  return (
    <header className="px-5 py-3.5 border-b border-slate-800 flex items-center justify-between">
      <div>
        <div className="flex items-center gap-2 font-mono text-[11px] text-slate-500">
          <span className="uppercase tracking-wider">TEA</span>
          <span>/</span>
          <span className="text-slate-300 uppercase tracking-wider">{n.label}</span>
        </div>
        <p className="text-[12px] text-slate-500 font-mono mt-1">{subs[active]}</p>
      </div>
      <div className="flex items-center gap-3 text-[11px] font-mono">
        <button className="flex items-center gap-1.5 text-slate-400 hover:text-slate-200 border border-slate-800 px-2.5 py-1.5">
          <Icon.refresh /> refresh
        </button>
        <button className="flex items-center gap-1.5 text-slate-400 hover:text-slate-200 border border-slate-800 px-2.5 py-1.5">
          <Icon.filter /> filters
        </button>
        <div className="border-l border-slate-800 pl-3 flex items-center gap-2">
          <span className="text-slate-500">range</span>
          <div className="flex border border-slate-800">
            {["1h", "24h", "7d", "30d"].map((r, i) => (
              <button key={r} className={`px-2 py-1 uppercase tracking-wider ${i === 1 ? "bg-emerald-500/10 text-emerald-400" : "text-slate-400 hover:text-slate-200"}`}>{r}</button>
            ))}
          </div>
        </div>
      </div>
    </header>
  );
}

function App() {
  const [active, setActive] = useState("overview");
  const [killArmed, setKillArmed] = useState(!!(window.__TEA_ENGINE && window.__TEA_ENGINE.kill_switch_active));
  const [strategies, setStrategies] = useState(STRATEGIES);

  // Background poll so cards stay fresh (10s).
  useEffect(() => {
    const id = setInterval(async () => {
      const o = await window.bootstrapOverview();
      if (o) {
        setStrategies(o.strategies);
        setKillArmed(!!o.engine.kill_switch_active);
      }
    }, 10_000);
    return () => clearInterval(id);
  }, []);

  const onTogglePause = async (id) => {
    const target = strategies.find(s => s.id === id);
    if (!target) return;
    // Optimistic flip.
    setStrategies(prev => prev.map(s => s.id === id ? { ...s, status: s.status === "running" ? "paused" : "running", paused: s.status === "running" } : s));
    try {
      if (target.status === "running") await window.API.pause(target.name);
      else                              await window.API.resume(target.name);
    } catch (e) {
      console.error(e);
      // Revert on failure.
      setStrategies(prev => prev.map(s => s.id === id ? target : s));
      alert(`No se pudo cambiar el estado de ${target.name}: ${e.message}`);
    }
  };

  const onToggleKill = async () => {
    try {
      if (killArmed) { await window.API.disarmKill(); setKillArmed(false); }
      else           { await window.API.armKill();    setKillArmed(true);  }
    } catch (e) {
      alert(`Kill switch falló: ${e.message}`);
    }
  };

  // If kill is armed, mark all as paused for visual
  const effectiveStrats = killArmed ? strategies.map(s => ({ ...s, status: "paused", heartbeat_ms: 0 })) : strategies;

  return (
    <div className="min-h-screen flex flex-col bg-[#0a0b0d]">
      <TickerBar />
      <div className="flex-1 flex">
        <Sidebar active={active} setActive={setActive} killArmed={killArmed} />
        <main className="flex-1 flex flex-col min-w-0">
          <PageHeader active={active} />
          <div className="flex-1 overflow-y-auto p-5">
            {active === "overview"   && <Overview strategies={effectiveStrats} killArmed={killArmed} setKillArmed={onToggleKill} onTogglePause={onTogglePause} />}
            {active === "strategies" && <Strategies strategies={effectiveStrats} onTogglePause={onTogglePause} />}
            {active === "research"   && <Research backtests={BACKTESTS} />}
            {active === "copilot"    && <Copilot />}
            {active === "feeds"      && <DataFreshness />}
            {active === "health"     && <SystemHealth />}
            {active === "contest"    && <Contest />}
          </div>
        </main>
      </div>
    </div>
  );
}

// Load real view-model from the API before mounting React. On failure
// (auth blip, network, etc.) falls back to the mock data already on
// `window` from mockData.jsx so the UI still renders.
window.BACKTESTS = window.BACKTESTS || [];
window.bootstrapOverview().finally(() => {
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
});
</script>
</body>
</html>
