<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>TEA login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-mono text-sm min-h-screen flex items-center justify-center">
  <form method="post" action="/login" class="w-full max-w-sm space-y-4 border border-slate-800 rounded p-6">
    <h1 class="text-lg font-semibold">TEA · dashboard</h1>
    {% if error %}
      <p class="text-red-400">{{ error }}</p>
    {% endif %}
    <label class="block">
      <span class="text-slate-400">API token</span>
      <input type="password" name="token" autocomplete="off" required
             class="mt-1 w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 focus:outline-none focus:border-slate-500" />
    </label>
    <button type="submit"
            class="w-full bg-slate-200 text-slate-900 font-semibold rounded py-2 hover:bg-white">
      enter
    </button>
  </form>
</body>
</html>
