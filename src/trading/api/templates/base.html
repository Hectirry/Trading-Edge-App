<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}TEA research{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
  <script src="https://unpkg.com/alpinejs@3.14.1" defer></script>
</head>
<body class="bg-slate-950 text-slate-100 font-mono text-sm">
  <header class="border-b border-slate-800 px-6 py-3 flex items-center justify-between">
    <a href="/research" class="text-slate-200 font-semibold">TEA · research</a>
    <nav class="space-x-4 text-slate-400">
      <a href="/research" class="hover:text-slate-100">backtests</a>
      <a href="/research/new" class="hover:text-slate-100">new</a>
      <a href="/research/chat" class="hover:text-slate-100">chat</a>
      <a href="/grafana" class="hover:text-slate-100" target="_blank" rel="noopener">grafana</a>
    </nav>
  </header>
  <main class="px-6 py-6">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
